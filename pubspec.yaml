name: playcado
description: "A Jellyfin client for iOS and Android"
publish_to: 'none'

version: 1.0.5

environment:
  sdk: ^3.8.0

dependencies:
  audio_session: ^0.2.2
  background_downloader: ^9.4.0
  bloc: ^9.2.0
  cached_network_image: ^3.4.1
  dio: ^5.3.3
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_chrome_cast: ^1.2.6
  flutter_launcher_icons: ^0.14.4
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  flutter_secure_storage: ^10.0.0
  go_router: ^17.0.0
  hugeicons: ^1.1.5
  intl: ^0.20.2
  jellyfin_dart:
    git:
      url: https://github.com/JchrisM12/jellyfin-dart.git
      ref: v10.11.4
  json_annotation: ^4.9.0
  logging: ^1.2.0
  media_kit: ^1.1.0
  media_kit_libs_android_video: ^1.2.4
  media_kit_libs_ios_video: ^1.0.4
  media_kit_video: ^2.0.1
  path_provider: ^2.1.2
  permission_handler: ^12.0.1
  sentry_flutter: ^9.8.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.2
  wakelock_plus: ^1.4.0


dependency_overrides:
  media_kit:
    git:
      url: https://github.com/media-kit/media-kit.git
      path: media_kit
      ref: main
  media_kit_video:
    git:
      url: https://github.com/media-kit/media-kit.git
      path: media_kit_video
      ref: main

dev_dependencies:
  build_runner: ^2.4.8
  json_serializable: ^6.11.3
  sentry_dart_plugin: ^3.2.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
  
  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/google_fonts/DMSans-Regular.ttf
        - asset: assets/google_fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/google_fonts/DMSans-Bold.ttf
          weight: 700
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/google_fonts/PlusJakartaSans-Regular.ttf
          weight: 600
        - asset: assets/google_fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/google_fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800
  
sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: playcado