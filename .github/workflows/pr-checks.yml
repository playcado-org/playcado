name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  semantic-pull-request:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/semantic_pull_request.yml@v1

  spell-check:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/spell_check.yml@v1
    with:
      includes: '**/*.dart'
      modified_files_only: false

  analyze-and-test:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      flutter_channel: stable
      min_coverage: 50
      setup: |
        dart run build_runner build --delete-conflicting-outputs

  build-android:
    name: Build Android (verify)
    runs-on: ubuntu-latest
    needs: [analyze-and-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create dummy secrets
        run: echo '{"SENTRY_DSN":""}' > config/secrets_dev.json

      - name: Build APK (dev flavor)
        run: flutter build apk --debug --flavor dev --target lib/main_dev.dart --dart-define-from-file=config/secrets_dev.json

  build-ios:
    name: Build iOS (verify)
    runs-on: macos-latest
    needs: [analyze-and-test]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create dummy secrets
        run: echo '{"SENTRY_DSN":""}' > config/secrets_dev.json

      - name: Build iOS (no codesign, dev flavor)
        run: flutter build ios --flavor dev --target lib/main_dev.dart --no-codesign --dart-define-from-file=config/secrets_dev.json
