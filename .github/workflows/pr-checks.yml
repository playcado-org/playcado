name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  spell-check:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/spell_check.yml@v1
    with:
      includes: '**/*.dart'
      modified_files_only: false

  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - uses: actions/upload-artifact@v4
        with:
          name: generated
          path: |
            lib/**/*.g.dart
            lib/**/*.freezed.dart
          retention-days: 1

  formatting:
    runs-on: ubuntu-latest
    needs: [generate]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: generated

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/ test/

  analyze-and-test:
    runs-on: ubuntu-latest
    needs: [generate, formatting]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: generated

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test --coverage

  build-android:
    name: Build Android (verify)
    runs-on: ubuntu-latest
    needs: [generate, analyze-and-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: generated

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dummy secrets
        run: echo '{"SENTRY_DSN":""}' > config/secrets_dev.json

      - name: Build APK (dev flavor)
        run: flutter build apk --debug --flavor dev --target lib/main_dev.dart --dart-define-from-file=config/secrets_dev.json

  build-ios:
    name: Build iOS (verify)
    runs-on: macos-latest
    needs: [generate, analyze-and-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: generated

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dummy secrets
        run: echo '{"SENTRY_DSN":""}' > config/secrets_dev.json

      - name: Build iOS (no codesign, dev flavor)
        run: flutter build ios --flavor dev --target lib/main_dev.dart --no-codesign --dart-define-from-file=config/secrets_dev.json
