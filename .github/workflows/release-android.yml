name: Release Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build & Release Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create secrets file
        run: echo '${{ secrets.SECRETS_PROD_JSON }}' > config/secrets_prod.json

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build App Bundle
        run: |
          flutter build appbundle \
            --flavor prod \
            --target lib/main_prod.dart \
            --release \
            --obfuscate \
            --split-debug-info=build/symbols \
            --build-number=$(( ${{ github.run_number }} + 14 )) \
            --dart-define-from-file=config/secrets_prod.json

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.ref_name }}
          path: build/app/outputs/bundle/prodRelease/app-prod-release.aab

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: android-symbols-${{ github.ref_name }}
          path: build/symbols/

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.playcado.app
          releaseFiles: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          track: ${{ inputs.track || 'internal' }}
          status: completed
          mappingFile: build/app/outputs/mapping/prodRelease/mapping.txt

      - name: Extract release notes
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          awk -v ver="[$VERSION]" \
            '/^## /{if (found) exit} found{print} index($0, "## " ver) == 1{found=1}' \
            CHANGELOG.md > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: build/app/outputs/bundle/prodRelease/app-prod-release.aab
