name: Release Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build & Release Android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //')
          echo "build_name=${VERSION%+*}" >> $GITHUB_OUTPUT
          echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Create secrets file
        run: echo '${{ secrets.SECRETS_JSON }}' > config/secrets.json

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build App Bundle
        run: |
          flutter build appbundle \
            --release \
            --obfuscate \
            --split-debug-info=build/symbols \
            --build-name=${{ steps.version.outputs.build_name }} \
            --build-number=${{ steps.version.outputs.build_number }} \
            --strip \
            --dart-define-from-file=config/secrets.json

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v5
        with:
          name: android-release-${{ steps.version.outputs.build_name }}
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload debug symbols
        uses: actions/upload-artifact@v5
        with:
          name: android-symbols-${{ steps.version.outputs.build_name }}
          path: build/symbols/

      - name: Extract release notes
        run: |
          mkdir -p distribution/whatsnew
          awk -v ver="[${{ steps.version.outputs.build_name }}]" \
            '/^## /{if (found) exit} found{print} index($0, "## " ver) == 1{found=1}' \
            CHANGELOG.md > distribution/whatsnew/whatsnew-en-US || true

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.playcado.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          tracks: internal
          status: completed
          mappingFile: build/app/outputs/mapping/release/mapping.txt
          debugSymbols: build/app/intermediates/merged_native_libs/release/mergeReleaseNativeLibs/out/lib
          whatsNewDirectory: distribution/whatsnew

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ steps.version.outputs.build_name }}
          body_path: distribution/whatsnew/whatsnew-en-US
          files: build/app/outputs/bundle/release/app-release.aab
