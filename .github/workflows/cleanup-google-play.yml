name: Cleanup Google Play Draft
on: workflow_dispatch
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyjwt cryptography

      - name: Discard old release
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 << 'PYEOF'
          import json, os, time, requests

          sa = json.loads(os.environ['SERVICE_ACCOUNT_JSON'])

          # Create JWT
          import jwt
          now = int(time.time())
          claim = {
              "iss": sa["client_email"],
              "scope": "https://www.googleapis.com/auth/androidpublisher",
              "aud": "https://oauth2.googleapis.com/token",
              "iat": now,
              "exp": now + 3600,
          }
          token = jwt.encode(claim, sa["private_key"], algorithm="RS256")

          # Exchange for access token
          resp = requests.post("https://oauth2.googleapis.com/token", data={
              "grant_type": "urn:ietf:params:oauth:grant-type:jwt-bearer",
              "assertion": token,
          })
          access_token = resp.json()["access_token"]
          headers = {"Authorization": f"Bearer {access_token}"}

          pkg = "com.playcado.app"

          # Create a new edit
          edit_resp = requests.post(
              f"https://androidpublisher.googleapis.com/androidpublisher/v3/applications/{pkg}/edits",
              headers=headers,
          )
          edit_id = edit_resp.json()["id"]
          print(f"Created edit: {edit_id}")

          # List tracks
          tracks_resp = requests.get(
              f"https://androidpublisher.googleapis.com/androidpublisher/v3/applications/{pkg}/edits/{edit_id}/tracks",
              headers=headers,
          )
          tracks = tracks_resp.json()
          print(f"Tracks: {json.dumps(tracks, indent=2)[:2000]}")

          # Find internal track releases with versionCode 1
          for track in tracks.get("tracks", []):
              if track["track"] == "internal":
                  releases = track.get("releases", [])
                  new_releases = []
                  for r in releases:
                      vcs = r.get("versionCodes", [])
                      if "1" in vcs:
                          print(f"Removing release: {r.get('name', 'unknown')} (versionCodes: {vcs})")
                          continue
                      new_releases.append(r)

                  if len(new_releases) != len(releases):
                      # Update the track
                      update_resp = requests.put(
                          f"https://androidpublisher.googleapis.com/androidpublisher/v3/applications/{pkg}/edits/{edit_id}/tracks/internal",
                          headers=headers,
                          json={
                              "track": "internal",
                              "releases": new_releases,
                          },
                      )
                      print(f"Update response: {update_resp.status_code} {update_resp.text[:500]}")
                      if update_resp.ok:
                          commit_resp = requests.post(
                              f"https://androidpublisher.googleapis.com/androidpublisher/v3/applications/{pkg}/edits/{edit_id}:commit",
                              headers=headers,
                          )
                          print(f"Commit response: {commit_resp.status_code} {commit_resp.text[:500]}")
                  else:
                      print("No release with versionCode 1 found")
                      # Discard the edit
                      requests.delete(
                          f"https://androidpublisher.googleapis.com/androidpublisher/v3/applications/{pkg}/edits/{edit_id}",
                          headers=headers,
                      )
          PYEOF
