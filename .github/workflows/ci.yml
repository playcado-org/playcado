name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create dummy secrets
        run: echo '{"SENTRY_DSN":""}' > config/secrets.json

      - name: Build Android (debug)
        run: flutter build apk --debug --dart-define-from-file=config/secrets.json

      - name: Build iOS (debug, no codesign)
        run: flutter build ios --no-codesign --dart-define-from-file=config/secrets.json
